name: Facebook Reel Upload (Loop)

on:
  workflow_dispatch:
    inputs:
      gdrive_upload_folder_id:
        description: "Google Drive folder ID holding pending videos"
        required: true
        type: string
      gdrive_uploaded_folder_id:
        description: "Google Drive folder ID to move videos to after a successful upload"
        required: true
        type: string
      captions_file_id:
        description: "(Optional) Google Drive file ID of captions.txt"
        required: false
        type: string
      loop_interval_minutes:
        description: "Minutes between posts (default: 30)"
        required: false
        default: "30"
        type: string
      # GitHub Actions jobs time out after 6 hours max.
      # This input controls how many TOTAL minutes the loop runs before
      # the job exits cleanly and re-queues itself.  Keep this well under
      # 360 (6 h) to leave headroom for the last upload to finish.
      max_runtime_minutes:
        description: "Total minutes this job should run before self-requeuing (max ~330)"
        required: false
        default: "300"
        type: string

jobs:
  upload-reel-loop:
    runs-on: ubuntu-latest
    # Hard ceiling — GitHub kills jobs at 6 h; we exit cleanly at 5 h 30 m
    timeout-minutes: 330

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install playwright schedule \
                      google-auth google-auth-httplib2 google-api-python-client
          playwright install chromium --with-deps

      # ── 4. Verify secrets / inputs ───────────────────────────────────────
      - name: Verify required inputs / secrets
        env:
          FB_STORAGE_STATE:       ${{ secrets.FB_STORAGE_STATE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GDRIVE_UPLOAD_FOLDER_ID: ${{ inputs.gdrive_upload_folder_id }}
          GDRIVE_UPLOADED_FOLDER_ID: ${{ inputs.gdrive_uploaded_folder_id }}
        run: |
          echo "📁 Workspace contents:"
          ls -lh
          echo ""
          echo "Checking required inputs…"
          for VAR_NAME in FB_STORAGE_STATE GOOGLE_CREDENTIALS_JSON \
                          GDRIVE_UPLOAD_FOLDER_ID GDRIVE_UPLOADED_FOLDER_ID; do
            VAL="${!VAR_NAME}"
            if [ -n "$VAL" ]; then
              echo "✅ $VAR_NAME is set"
            else
              echo "❌ $VAR_NAME is MISSING"
            fi
          done
          echo "⏱️  Loop interval : ${{ inputs.loop_interval_minutes }} minute(s)"
          echo "⏱️  Max runtime   : ${{ inputs.max_runtime_minutes }} minute(s)"

      # ── 5. Run the loop ──────────────────────────────────────────────────
      #
      # The Python scheduler runs forever by design.  We wrap it with the
      # `timeout` command so it exits cleanly after max_runtime_minutes,
      # then the "Self-requeue" step below triggers a fresh workflow run so
      # the loop continues without interruption.
      #
      - name: Run upload loop
        env:
          TZ:                      "Asia/Karachi"
          FB_STORAGE_STATE:        ${{ secrets.FB_STORAGE_STATE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GDRIVE_UPLOAD_FOLDER_ID: ${{ inputs.gdrive_upload_folder_id }}
          GDRIVE_UPLOADED_FOLDER_ID: ${{ inputs.gdrive_uploaded_folder_id }}
          CAPTIONS_FILE_ID:        ${{ inputs.captions_file_id }}
          LOOP_INTERVAL_MINUTES:   ${{ inputs.loop_interval_minutes }}
        # `timeout` exits with code 124 when time expires — that is expected,
        # so we append `|| true` to prevent the step from failing the job.
        run: |
          SECONDS=$(( ${{ inputs.max_runtime_minutes }} * 60 ))
          echo "🔁 Starting loop — will run for up to ${SECONDS}s then self-requeue"
          timeout ${SECONDS} python post_facebook.py || true
          echo "⏹️  Loop window finished"

      # ── 6. Refresh FB session secret ─────────────────────────────────────
      - name: Refresh FB_STORAGE_STATE secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f "storage_state.json" ]; then
            gh secret set FB_STORAGE_STATE \
              --repo "${{ github.repository }}" < storage_state.json
            echo "✅ FB_STORAGE_STATE secret refreshed"
          else
            echo "⚠️  storage_state.json not found — skipping secret refresh"
          fi

      # ── 7. Upload debug artefacts ─────────────────────────────────────────
      - name: Upload screenshots & debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-upload-result-${{ github.run_number }}
          path: |
            *.png
            screenshots/*.png
            *.html
          retention-days: 7
          if-no-files-found: warn

      # ── 8. Self-requeue — keep the loop alive across job boundaries ───────
      #
      # After the loop window ends, we trigger a new workflow_dispatch run
      # with the same inputs so posting continues seamlessly.
      #
      # Requires the GH_PAT secret (fine-grained PAT with
      # "Actions: Read & Write" permission on this repo).
      #
      # To STOP the loop: cancel the currently-running job in the
      # GitHub Actions UI before this step executes, OR remove GH_PAT
      # from your repo secrets.
      #
      - name: Self-requeue workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️  GH_PAT not set — self-requeue skipped (loop will not continue)"
            exit 0
          fi

          echo "🔄 Requeueing workflow for next window…"
          gh workflow run \
            "${{ github.workflow }}" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            --field gdrive_upload_folder_id="${{ inputs.gdrive_upload_folder_id }}" \
            --field gdrive_uploaded_folder_id="${{ inputs.gdrive_uploaded_folder_id }}" \
            --field captions_file_id="${{ inputs.captions_file_id }}" \
            --field loop_interval_minutes="${{ inputs.loop_interval_minutes }}" \
            --field max_runtime_minutes="${{ inputs.max_runtime_minutes }}"

          echo "✅ Next job queued — loop will continue uninterrupted"

name: Facebook Reel Upload
on:
  workflow_dispatch:

jobs:
  upload-reel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Verify required files exist
        run: |
          echo "📁 Workspace contents:"
          ls -lh
          echo ""
          echo "Checking required files…"
          [ -f "facebook_cookies.txt" ] && echo "✅ facebook_cookies.txt found" || echo "❌ facebook_cookies.txt MISSING"
          [ -f "captions.txt" ]         && echo "✅ captions.txt found"         || echo "❌ captions.txt MISSING"
          [ -f "testing.mp4" ]          && echo "✅ testing.mp4 found"          || echo "❌ testing.mp4 MISSING"
          [ -f "testing.mp4" ] && echo "   Video size: $(du -h testing.mp4 | cut -f1)"

      - name: Upload Reel to Facebook
        env:
          TZ: "Asia/Karachi"
        run: python post_facebook.py

      - name: Upload Screenshots & Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-upload-result
          path: |
            *.png
            screenshots/*.png
            *.html
          retention-days: 7
          if-no-files-found: warn

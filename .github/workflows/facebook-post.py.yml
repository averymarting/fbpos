name: Facebook Post
on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Facebook Post Script
        env:
          TZ: "Asia/Karachi"
        run: python post_facebook.py

      - name: Upload Screenshots & Debug Files
        if: always()   # run even if the step above fails
        uses: actions/upload-artifact@v4
        with:
          name: facebook-post-result
          path: |
            *.png
            screenshots/*.png
            page_debug.html
          retention-days: 7
          if-no-files-found: warn
